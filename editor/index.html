<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Kitchen Level Editor</title>
    <link rel="stylesheet" href="editor/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/controls/TransformControls.js": "./editor/jsm/controls/TransformControls.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.4/index.js"
            }
        }
    </script>
</head>

<body>

    <div id="editor-ui">
        <div id="toolbar">
            <button id="new-level-button">New Level</button>
            <button id="load-level-button">Load Level</button>
            <button id="load-level1-button">Load Level 1</button>
            <button id="save-level-button">Save Level</button>
            <button id="delete-object-button">Delete Object</button>
            <button id="test-level-button">Test Level (Game)</button>
        </div>
        <div id="palette">
            <h3>Object Palette</h3>
            <div id="palette-objects">
                <!-- Buttons for objects will be added here by JS -->
            </div>
        </div>
        <div id="properties-panel">
            <h3>Properties</h3>
            <div id="object-properties">
                <p>No object selected.</p>
            </div>
        </div>
    </div>

    <canvas id="editorCanvas"></canvas>

    <script type="module" src="editor/editor.js"></script>
</body>

</html>
